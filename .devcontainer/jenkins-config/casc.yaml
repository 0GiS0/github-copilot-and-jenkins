jenkins:
  systemMessage: "🤖 GitHub Copilot CLI + Jenkins Demo - Ready to use!"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 3
  
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
          name: "Administrator"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "gh-token"
              secret: "${GH_TOKEN}"
              description: "GitHub Token for Copilot CLI"
          - usernamePassword:
              scope: GLOBAL
              id: "github-token"
              username: "0GiS0"
              password: "${GH_TOKEN}"
              description: "GitHub token for private repository checkout"

unclassified:
  location:
    url: "http://localhost:8081/"
  ansiColorBuildWrapper:
    globalColorMapName: "xterm"
  copilotChatConfiguration:
    cliUrl: "http://copilot-cli:3000"
