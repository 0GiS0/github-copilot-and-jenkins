services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
      - jenkins_home:/var/jenkins_home
    depends_on:
      - jenkins
    networks:
      - jenkins-net

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins-config:/var/jenkins_config:ro
      - ..:/workspace:ro
      - ../jenkins-copilot-chat-plugin/target/copilot-chat-0.1.0-SNAPSHOT.hpi:/usr/share/jenkins/ref/plugins/copilot-chat.hpi:ro
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_config/casc.yaml
      - GH_TOKEN=${GH_TOKEN:-}
      
    networks:
      - jenkins-net

volumes:
  jenkins_home:

networks:
  jenkins-net:
