services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
      - jenkins_home:/var/jenkins_home
    depends_on:
      - jenkins
    networks:
      - jenkins-net

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins-config:/var/jenkins_config:ro
      - ..:/workspace:ro
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xms512m -Xmx1g -XX:+UseG1GC -XX:+AlwaysPreTouch
      - CASC_JENKINS_CONFIG=/var/jenkins_config/casc.yaml
      - GH_TOKEN=${GH_TOKEN:-}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1536M
        reservations:
          cpus: '1'
          memory: 1024M
    networks:
      - jenkins-net

volumes:
  jenkins_home:

networks:
  jenkins-net:
