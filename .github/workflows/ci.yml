name: CI

on:
  push:
    branches: [main]
    paths:
      - 'jenkins-copilot-chat-plugin/**'
  pull_request:
    branches: [main]
    paths:
      - 'jenkins-copilot-chat-plugin/**'

jobs:
  spotless:
    name: 🎨 Spotless Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jenkins-copilot-chat-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check formatting with Spotless
        run: mvn spotless:check -q

  checkstyle:
    name: 🔍 Checkstyle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jenkins-copilot-chat-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [spotless, checkstyle]
    defaults:
      run:
        working-directory: jenkins-copilot-chat-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build plugin
        run: mvn package -Dmaven.test.skip=true -q

      - name: Upload HPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-chat-plugin
          path: jenkins-copilot-chat-plugin/target/*.hpi
          retention-days: 7
